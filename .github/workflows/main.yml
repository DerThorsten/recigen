name: test recigen

on:
  push:
  pull_request:

jobs:

  build_recipes:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    strategy:
      fail-fast: false

    steps:
      ################################################################
      # SETUP
      ################################################################
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.66.0
      - run: pixi run test